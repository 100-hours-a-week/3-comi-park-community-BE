spring:
  mvc:
    servlet.path: /api

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ### JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect

### Multipart 요청 설정
servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 15MB

logging:
  level:
    org.hibernate.SQL: debug

### 값 설정
app:
  public-endpoints:
    - path: /api/health
      method: GET
    - path: /api/members
      method: POST
    - path: /api/members/availability/email
      method: POST
    - path: /api/members/availability/nickname
      method: POST
    - path: /api/images
      method: POST

storage:
  local_storage_path: ${LOCAL_STORAGE_PATH}
  static-base-url: ${STATIC_BASE_URL}

# JWT
jwt:
  secret-key: ${JWT_SECRET_KEY}
  issuer: ${JWT_ISSUER}
  access-token:
    key: accessToken
    path: /
    max-age: 900 # 15분
  refresh-token:
    key: refreshToken
    path: /api/auth/jwt
    max-age: 2592000 # 30일

# Session
session:
  session-id:
    key: sid
    path: /
    max-age: 900 # 15분
  refresh-id:
    key: rid
    path: /api/auth/session
    max-age: 2592000 # 30일

# Cookie
cookie:
  http-only: true
  same-site: LAX
  secure: false

# CORS
cors:
  allow-origins: http://localhost:3000, https://www.kbt-comi.store, https://kbt-comi.store