spring:
  config:
    import: application-secret.yml

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  multipart:
    max-file-size: 10MB
    max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: debug