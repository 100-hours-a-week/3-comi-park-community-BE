spring:
  config:
    import: application-secret.yml

  ### 정적 파일 경로 설정
  mvc:
    static-path-pattern: /static/**

  ### JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

### Multipart 요청 설정
servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 15MB

logging:
  level:
    org.hibernate.SQL: debug