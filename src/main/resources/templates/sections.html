<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아무 말 대잔치</title>

    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
</head>
<body>

<header th:insert="header :: headerFragment"></header>
<main>
    <section>
        <div class="title" th:text="${title}"></div>

        <div class="section-container" th:each="section : ${sections}">
            <div class="section-title" th:text="${sectionStat.count} + '. ' + ${section.title}"></div>
            <ul class="section-content">
                <li th:each="content : ${section.contents}" th:text="'- ' + ${content}"></li>
            </ul>
        </div>

    </section>
</main>

</body>
</html>
