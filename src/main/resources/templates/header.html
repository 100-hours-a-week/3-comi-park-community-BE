<html lagn="ko" xmlns:th="http://www.thymeleaf.org">
<header th:fragment="header-fragment">
    <!-- 뒤로가기 버튼 -->
    <div class="header-backward-container">
        <button class="header-backward-btn" aria-label="뒤로가기">
            <svg class="header-backward-icon" viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <!-- 로고 -->
    <div class="logo">
        <a th:href="${@environment.getProperty('frontend.domain')} + '/index'">♡ Gossip Girl ♡</a>
    </div>

    <div class="header-profile-container"></div>
</header>
</html>
