name: Spring CI/CD

on:
  push:
    branches:
      - develop

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache gradle # 빌드 속도 최적화
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

  push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: test # test 성공 시 진행

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Portainer Registry
        run: |
          echo "🔐 Logging in to registry..."
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login \
            ${{ secrets.REGISTRY_URL }} \
            --username "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin \
            || { echo "❌ Registry login FAILED"; exit 1; }
          echo "✅ Registry login successful"

      - name: Build docker image
        run: |
          IMAGE_URI="${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_REPOSITORY }}:latest"
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          echo "🛠 Building image: $IMAGE_URI"
          docker build -t "${IMAGE_URI}" . || { echo "❌ Docker build FAILED"; exit 1; }
          echo "✅ Docker build successful"

      - name: Push docker image
        run: |
          echo "⬆️ Pushing image: ${IMAGE_URI}"
          docker push "${{ env.IMAGE_URI }}" || { echo "❌ Docker push FAILED"; exit 1; }
          echo "🎉 Docker push successful"

  deploy:
    name: Deploy (SSM)
    runs-on: ubuntu-latest
    needs: push # push 성공 시 진행

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 using SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring using Docker Compose" \
            --parameters '{
              "commands": [
                "cd /home/ubuntu",
                "docker compose -f docker-compose-spring.yml pull spring",
                "docker compose -f docker-compose-spring.yml up -d spring"
              ]
            }'