name: Spring CI/CD

on:
  push:
    branches:
      - develop

permissions:
  id-token: write # OIDC 토큰 발급 허용
  contents: read  # actions/checkout용

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 빌드 속도 최적화
      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

  push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: test # test Job 성공 시 진행

    env:
      IMAGE_TAG: sha-${{ github.sha }}
      IMAGE_URL: "${{ secrets.AWS_ECR_REGISTRY_URL }}/${{ secrets.AWS_ECR_REPOSITORY_NAME }}"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 1) GitHub OIDC로 AWS 임시 Credential 받기
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2) 기존 latest 이미지를 SHA 태그로 보존
      - name: Tag previous latest image as SHA tag
        run: |
          # ECR 레포지터리에서 latest 태그가 붙은 이미지의 digest (내용물 해시값) 조회해 DIGEST 변수에 저장
          DIGEST=$(aws ecr describe-images \
            --repository-name="${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>/dev/null || true)
          
          echo "ℹ️ FOUND DIGEST: $DIGEST"
          
          # DIGEST 값이 None 이거나 비어 있으면 (= latest 이미지가 없으면)
          if [ "$DIGEST" = "None" ] || [ -z "$DIGEST" ]; then
            # 태깅 작업 스킵
            echo "⚠️️ No latest image exists. Skip tagging."
          else
            # latest 이미지 존재하면
            # 현재 latest의 digest 사용해 IMAGE_TAG로 새 이미지 태그 생성 (rename 개념)
            aws ecr put-image \
              --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
              --image-tag "$IMAGE_TAG" \
              --image-manifest "$(aws ecr batch-get-image \
                --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
                --image-ids imageDigest=$DIGEST \
                --query 'images[0].imageManifest' \
                --output text)"
          
            echo "ℹ️ Previous latest is now tagged as $IMAGE_TAG"
          fi

      # 3) 최신 도커 이미지(latest) 빌드
      - name: Build Docker Image
        run: |
          docker build -t "${IMAGE_URL}:latest" . || { echo "❌ Docker build FAILED"; exit 1; }
          echo "✅ Docker build successful"

      # 4) ECR 로그인
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5) ECR에 최신 도커 이미지(latest) 푸시
      - name: Push Docker Image
        run: |
          docker push "${IMAGE_URL}:latest" || { echo "❌ latest Docker push FAILED"; exit 1; }
          echo "🎉 Docker push successful"

      # 6) 최신 버전과 직전 버전 제외한 이미지 삭제
      - name: Cleanup ECR old images
        run: |
          # ECR 레포지터리 내 모든 이미지 태그 목록 가져와 IMAGES 변수에 저장 (텍스트)
          IMAGES=$(aws ecr describe-images \
            --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
            --query 'imageDetails[].imageTags[]' \
            --output text)
          
          # 공백 기준으로 나뉜 태그들을 TAGS 배열로 변환
          TAGS=($IMAGES)
          echo "📁 All tags: ${TAGS[@]}"
          
          # latest와 sha tag 태그 제외한 나머지 이미지 삭제
          for TAG in "${TAGS[@]}"; do
            if [ "$TAG" != "latest" ] && [ "$TAG" != "${IMAGE_TAG}" ]; then
              echo "🔥 Deleting $TAG"
              aws ecr batch-delete-image \
                --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
                --image-ids imageTag="$TAG" || true
            fi
          done

  deploy:
    name: Deploy via SSM
    runs-on: ubuntu-latest
    needs: push # push Job 성공 시 진행

    steps:
      # 1) GitHub OIDC로 AWS 임시 Credential 받기
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SSM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "cd /home/ubuntu",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_URL }}",
                "docker compose -f docker-compose.yml pull spring",
                "docker compose -f docker-compose.yml up -d spring"
              ]
            }'