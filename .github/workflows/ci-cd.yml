name: Spring CI/CD

on:
  push:
    branches:
      - develop

permissions:
  id-token: write # OIDC 토큰 발급 허용
  contents: read  # actions/checkout용

env:
  IMAGE_TAG: sha-${{ github.sha }}
  IMAGE_URL: "${{ secrets.AWS_ECR_REGISTRY_URL }}/${{ secrets.AWS_ECR_REPOSITORY_NAME }}"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 빌드 속도 최적화
      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

  push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: test # test Job 성공 시 진행

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 1) GitHub OIDC로 AWS 임시 Credential 받기
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2) 최신 도커 이미지 빌드
      - name: Build Docker Image
        run: |
          docker build -t "${IMAGE_URL}:${IMAGE_TAG}" . || { echo "❌ Docker build FAILED"; exit 1; }
          echo "✅ Docker build successful"

      # 3) ECR 로그인
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4) ECR에 최신 도커 이미지 푸시
      - name: Push Docker Image
        run: |
          docker push "${IMAGE_URL}:${IMAGE_TAG}" || { echo "❌ Docker push FAILED"; exit 1; }
          echo "🎉 Docker push successful"

      # 5) ECR에서 현재 배포와 직전 배포(롤백용) 제외한 모든 이미지 삭제
      - name: Cleanup old images in ECR
        run: |
          # 모든 이미지의 DIGEST 조회 (imagePushedTime 기반 최신순)
          DIGESTS=$(aws ecr describe-images \
            --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
            --query 'sort_by(imageDetails,& imagePushedAt) | reverse(@) | [].imageDigest' \
            --output text)
          
          # 공백 기준으로 나뉜 DIGEST들을 배열로 변환
          DIGEST_ARRAY=($DIGESTS)
          
          echo "Total digests found: ${#DIGEST_ARRAY[@]}"

          # 최신 2개(현재 배포, 롤백용 배포) 제외하고 삭제
          for ((i=2; i<${#DIGEST_ARRAY[@]}; i++)); do
            DIGEST="${DIGEST_ARRAY[$i]}"
            echo "🔥 Deleting digest: $DIGEST"
            aws ecr batch-delete-image \
              --repository-name "${{ secrets.AWS_ECR_REPOSITORY_NAME }}" \
              --image-ids imageDigest="$DIGEST" || true
          done

  deploy:
    name: Deploy via SSM
    runs-on: ubuntu-latest
    needs: push # push Job 성공 시 진행

    steps:
      # 1) GitHub OIDC로 AWS 임시 Credential 받기
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SSM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2) EC2에 배포
      - name: Deploy to EC2 via SSM
        run: |
          # COMMAND_ID 저장
          # IMAGE_URL, IMAGE_TAG 확인용 .env.deploy 생성
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=ktb-spring-01" \
            --document-name "AWS-RunShellScript" \
            --parameters "{
              \"commands\": [
                \"cd /home/ubuntu\",
                \"echo IMAGE_URL=${IMAGE_URL} > .env.deploy\",
                \"echo IMAGE_TAG=${IMAGE_TAG} >> .env.deploy\",
                \"export \$(cat .env.deploy | xargs)\",
                \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_URL }}\",
                \"sudo IMAGE_URL=${IMAGE_URL} IMAGE_TAG=${IMAGE_TAG} docker compose pull >> deploy.log 2>&1\",
                \"sudo IMAGE_URL=${IMAGE_URL} IMAGE_TAG=${IMAGE_TAG} docker compose up -d --remove-orphans >> deploy.log 2>&1\"
              ]
            }" \
            --query "Command.CommandId" \
            --output text)
                    
          # COMMAND_ID의 Status 폴링
          STATUS="InProgress"
          while [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; do
            sleep 3
            STATUS=$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --details --query "CommandInvocations[0].Status" --output text)
          done
          
          echo "Deployment Status: $STATUS"
          
          if [ "$STATUS" = "Success" ]; then
            echo "🎉 Deployment Success"
          else
            echo "❌ Deployment Failed. Check logs"
            exit 1
          fi
